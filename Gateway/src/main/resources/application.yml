spring:
  application:
    name: hr-api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false   # evita conflito com rotas manuais

      routes:
        # Worker Service
        - id: hr-worker
          uri: lb://hr-worker
          predicates:
            - Path=/workers/**   
          filters:
            - StripPrefix=1

        # Payroll Service
        - id: hr-payroll
          uri: lb://hr-payroll
          predicates:
            - Path=/payments/**  
          filters:
            - StripPrefix=1

        # User Service
        - id: hr-user
          uri: lb://hr-user
          predicates:
            - Path=/users/** 
          filters:
            - StripPrefix=1

        # OAuth Service
        - id: hr-oauth
          uri: lb://hr-oauth
          predicates:
            - Path=/oauth/** 
          filters:
            - StripPrefix=1
            - RemoveRequestHeader=Cookie

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka 

server:
  port: 8765

security:
  jwt:
    secret: MY-SECRET-KEY-MUST-BE-256-BITS-LONG!!